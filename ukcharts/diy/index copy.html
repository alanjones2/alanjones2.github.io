<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Charts DIY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.14/dist/plot.umd.min.js"></script>

<body>
    <script>
        const partyColors = {
            'Conservative': '#0087DC',
            'Labour': '#DC241f',
            'Liberal Democrats': '#FAA91E',
            'Green': '#6AB023',
            'Reform': '#12E5C7',
            'SNP': '#FDF38E',
            'Plaid Cymru': '#00B140'
        };

        async function fetchData(filename = '12months.json') {
            const response = await fetch(filename);
            return response.json();
        }
        async function main() {
            let data = [];
            let maxPercent = 0;

            const getSelectedFile = () => document.querySelector('input[name="datafile"]:checked')?.value || '12months.json';

            const updatePlot = () => {
                const selectedParties = Array.from(document.querySelectorAll('input[name="party"]:checked')).map(cb => cb.value);
                const filteredData = data.filter(d => d.Percent != null && selectedParties.includes(d.Party)).map(d => ({...d, Date: new Date(d.Date)}));

                const plot = Plot.plot({
                    x: {type: "time"},
                    y: {domain: [0, maxPercent]},
                    color: {type: "categorical", domain: Object.keys(partyColors), range: Object.values(partyColors)},
                    marks: [
                        Plot.dot(filteredData, {
                            x: "Date",
                            y: "Percent",
                            fill: "Party"
                        })
                    ]
                });

                const chartDiv = document.getElementById('chart');
                chartDiv.innerHTML = '';
                chartDiv.appendChild(plot);
            };

            const loadData = async () => {
                const filename = getSelectedFile();
                data = await fetchData(filename);
                maxPercent = d3.max(data, d => d.Percent);
                updatePlot();
            };

            // Initial load
            await loadData();

            document.querySelectorAll('input[name="party"]').forEach(cb => {
                cb.addEventListener('change', updatePlot);
            });

            document.querySelectorAll('input[name="datafile"]').forEach(rb => {
                rb.addEventListener('change', loadData);
            });
        }
        main();
    </script>
    <div class="container">
        <h1>Welcome to UK Charts DIY</h1>
        <p>This is a simple HTML page.</p>
        <div class="mb-3">
            <h5>Select data range:</h5>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="datafile" id="1month" value="1month.json">
                <label class="form-check-label" for="1month">1 month</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="datafile" id="3months" value="3months.json">
                <label class="form-check-label" for="3months">3 months</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="datafile" id="6months" value="6months.json">
                <label class="form-check-label" for="6months">6 months</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="datafile" id="12months" value="12months.json" checked>
                <label class="form-check-label" for="12months">12 months</label>
            </div>
        </div>
        <div class="mb-3">
            <h5>Select a Party:</h5>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="party" value="Conservative" id="conservative" checked>
                <label class="form-check-label" for="conservative">
                    <span style="display: inline-block; width: 10px; height: 10px; background-color: #0087DC; margin-right: 5px;"></span> Conservative
                </label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="party" value="Labour" id="labour" checked>
                <label class="form-check-label" for="labour">
                    <span style="display: inline-block; width: 10px; height: 10px; background-color: #DC241f; margin-right: 5px;"></span> Labour
                </label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="party" value="Liberal Democrats" id="libdem" checked>
                <label class="form-check-label" for="libdem">
                    <span style="display: inline-block; width: 10px; height: 10px; background-color: #FAA91E; margin-right: 5px;"></span> Liberal Democrats
                </label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="party" value="Green" id="green" checked>
                <label class="form-check-label" for="green">
                    <span style="display: inline-block; width: 10px; height: 10px; background-color: #6AB023; margin-right: 5px;"></span> Green
                </label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="party" value="Reform" id="reform" checked>
                <label class="form-check-label" for="reform">
                    <span style="display: inline-block; width: 10px; height: 10px; background-color: #12E5C7; margin-right: 5px;"></span> Reform
                </label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="party" value="SNP" id="snp" checked>
                <label class="form-check-label" for="snp">
                    <span style="display: inline-block; width: 10px; height: 10px; background-color: #FDF38E; margin-right: 5px;"></span> SNP
                </label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="party" value="Plaid Cymru" id="plaid" checked>
                <label class="form-check-label" for="plaid">
                    <span style="display: inline-block; width: 10px; height: 10px; background-color: #00B140; margin-right: 5px;"></span> Plaid Cymru
                </label>
            </div>
        </div>
        <div id="chart" style="width: 100%; height: 400px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
